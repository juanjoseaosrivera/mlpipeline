[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "SIM"]
ignore = ["B008"]  # FastAPI's Depends() in argument defaults is idiomatic.

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src"]

[[tool.mypy.overrides]]
module = ["sklearn.*", "scipy.*", "mlflow.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["src.models.data", "src.drift.detector"]
disable_error_code = ["type-arg"]

[[tool.mypy.overrides]]
module = ["src.api.db.models"]
disable_error_code = ["type-arg", "no-untyped-call"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=src --cov-report=term --cov-report=xml --cov-fail-under=80"

[tool.coverage.run]
source = ["src"]
omit = ["src/api/main.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
