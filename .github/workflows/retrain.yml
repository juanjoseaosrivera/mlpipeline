name: Retrain

on:
  workflow_dispatch:
    inputs:
      seed:
        description: "Training seed"
        required: false
        default: "42"
  repository_dispatch:
    types: [drift_detected]
  schedule:
    # Weekly Monday 06:00 UTC — drift-driven retraining is the primary
    # trigger; the cron is a safety net so weeks without drift signal
    # still get a recency check.
    - cron: "0 6 * * 1"

jobs:
  retrain:
    name: Retrain ProductionModel candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull DVC-tracked data (if remote is configured)
        if: env.AWS_ACCESS_KEY_ID != ''
        working-directory: .
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: dvc pull --force || echo "dvc pull failed; continuing with synthetic data"

      - name: Train and register new candidate
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DRIFT_TRIGGER: ${{ github.event.action || github.event_name }}
        run: |
          SEED="${{ github.event.inputs.seed || github.run_number }}"
          echo "::notice::Retrain triggered by ${DRIFT_TRIGGER}, seed=${SEED}"
          python -m src.models.train --seed "${SEED}"

      - name: Note manual promotion required
        run: |
          echo "::notice::New model version registered. Promotion to Production is intentionally manual — see backend/src/models/README.md for the runbook."
